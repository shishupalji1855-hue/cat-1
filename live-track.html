<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10haath Live Track</title>
    <style>
      body { font-family: Arial, sans-serif; background: #0f1d33; color: #fff; margin: 0; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; color: #1b1b1b; border-radius: 14px; padding: 16px; }
      .btn { display: inline-block; margin-top: 12px; background: #0f7a6d; color: #fff; padding: 10px 14px; border-radius: 10px; text-decoration: none; }
      .meta { font-size: 12px; color: #4b4b4b; margin-top: 8px; }
      input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
      iframe { width: 100%; height: 360px; border: 0; border-radius: 12px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Live Tracking</h2>
      <div class="card">
        <p>Latest live location link:</p>
        <input id="liveLink" readonly />
        <a class="btn" id="openBtn" href="#" target="_blank" rel="noreferrer">OPEN MAP</a>
        <div class="meta" id="status"></div>
        <iframe id="mapFrame" title="Live map"></iframe>
      </div>
    </div>
    <script>
      const API_BASE = "https://sheetdb.io/api/v1/vpozwh7cptzc4";
      const params = new URLSearchParams(window.location.search);
      const sheet = params.get("sheet") || "P00_Human";
      const idValue = params.get("id") || "";
      const liveLinkEl = document.getElementById("liveLink");
      const statusEl = document.getElementById("status");
      const mapFrame = document.getElementById("mapFrame");
      const openBtn = document.getElementById("openBtn");

      async function fetchByField(fieldName) {
        const url = `${API_BASE}/search?${encodeURIComponent(fieldName)}=${encodeURIComponent(idValue)}&sheet=${encodeURIComponent(sheet)}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return null;
        return data[data.length - 1];
      }

      async function refresh() {
        if (!idValue) {
          statusEl.textContent = "Missing id in URL.";
          return;
        }
        let row = await fetchByField("Cust_ID");
        if (!row) row = await fetchByField("Cust_ID(No.)");
        if (!row) {
          statusEl.textContent = "No record found yet.";
          return;
        }
        const link = row["Liv location"] || row["Live location"] || "";
        liveLinkEl.value = link;
        openBtn.href = link || "#";
        mapFrame.src = link ? `https://maps.google.com/maps?q=${encodeURIComponent(link)}&output=embed` : "";
        const ts = row.Timestamp || "";
        statusEl.textContent = link ? `Last update: ${ts}` : "Waiting for live location...";
      }

      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
